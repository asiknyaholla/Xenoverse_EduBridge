<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBridge – Smart Learning</title>
    <style>
        /* Basic styling to make it look clean */
        body { font-family: sans-serif; line-height: 1.6; margin: 0; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .section { margin-bottom: 30px; }
        .center { text-align: center; }
        input { display: block; margin: 10px 0; padding: 8px; width: 100%; max-width: 300px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        nav a { margin-right: 15px; text-decoration: none; color: #333; }
        .active { font-weight: bold; color: #007bff; }
        canvas { max-width: 600px; margin-top: 20px; }
    </style>
</head>
<body>

<header class="site-header">
    <div class="logo"><strong>EduBridge</strong></div>
    <nav class="main-nav">
        <a href="/" class="active">Home</a>
        <a href="#">Resources</a>
        <a href="#">Notifications</a>
    </nav>
</header>

<section class="hero center">
    <h1>Smart Learning for Rural Students</h1>
    <p>Learn in your language, track progress, and improve with guidance.</p>
</section>

<div class="section center">
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('kn')">ಕನ್ನಡ (Kannada)</button>
    <button onclick="setLanguage('hi')">हिन्दी (Hindi)</button>
    <p>Current Language: <span id="langDisplay">English</span></p>
</div>

<section class="section">
    <h2>AI Study Assistant</h2>
    <div class="card">
        <input id="chatInput" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
        <p id="reply"><em>AI Response will appear here...</em></p>
        <button onclick="speakText()">🔊 Speak</button>
    </div>
</section>

<section class="section">
    <h2>Personalized Learning</h2>
    <div class="card">
        <p>Enter your marks (0-100):</p>
        <input type="number" id="kannada" placeholder="Kannada">
        <input type="number" id="english" placeholder="English">
        <input type="number" id="math" placeholder="Math">
        <input type="number" id="science" placeholder="Science">
        <input type="number" id="social" placeholder="Social Science">
        <button onclick="getPlan()">Analyze My Performance</button>
        <div id="plan" style="margin-top: 15px; color: #d9534f; font-weight: bold;"></div>
    </div>
    <canvas id="chart"></canvas>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let currentLang = "en";
let myChart = null;

function setLanguage(lang) {
    currentLang = lang;
    const names = {en: "English", kn: "Kannada", hi: "Hindi"};
    document.getElementById("langDisplay").innerText = names[lang];
}

function sendMessage() {
    let msg = document.getElementById("chatInput").value;
    fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg, lang: currentLang})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("reply").innerText = data.reply;
    })
    .catch(err => console.error("Error:", err));
}

function speakText() {
    let text = document.getElementById("reply").innerText;
    let speech = new SpeechSynthesisUtterance(text);
    const voices = { kn: "kn-IN", hi: "hi-IN", en: "en-US" };
    speech.lang = voices[currentLang];
    window.speechSynthesis.speak(speech);
}

function getPlan() {
    const subjects = ["kannada", "english", "math", "science", "social"];
    let data = {};
    subjects.forEach(s => {
        data[s] = document.getElementById(s).value || 0;
    });

    fetch('/api/recommend', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        document.getElementById("plan").innerHTML = res.advice.join("<br>");
        drawChart(data);
    });
}

function drawChart(data) {
    const ctx = document.getElementById("chart").getContext('2d');
    if (myChart) { myChart.destroy(); }
    
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(data).map(s => s.toUpperCase()),
            datasets: [{
                label: "Subject Marks",
                data: Object.values(data),
                backgroundColor: '#007bff'
            }]
        },
        options: { scales: { y: { beginAtZero: true, max: 100 } } }
    });
}
</script>

</body>
</html>
